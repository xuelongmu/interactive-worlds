name: Revolution CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: revolution-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: revolution
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: revolution/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run self-contained application tests
        run: npm run test:ci

      - name: Test session broker
        run: npm run test:server

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

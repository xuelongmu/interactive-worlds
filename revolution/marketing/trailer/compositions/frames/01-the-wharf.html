<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          container-type: size;
        }

        .frame01-the-wharf-scene {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          background: #0d0c0a;
        }

        .frame01-the-wharf-camera {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          transform-origin: 50% 50%;
          will-change: transform;
        }

        .frame01-the-wharf-image {
          position: absolute;
          top: 45px;
          left: 0;
          width: 1920px;
          height: 1080px;
          object-fit: cover;
          user-select: none;
          pointer-events: none;
        }

        .frame01-the-wharf-depth {
          --dof: 14px;
          filter: blur(var(--dof));
          will-change: filter, opacity;
        }

        .frame01-the-wharf-focal {
          position: absolute;
          inset: 0;
          overflow: hidden;
          background-image: url("assets/images/tea-party.png");
          background-position: 0 45px;
          background-repeat: no-repeat;
          background-size: 1920px 1080px;
          opacity: 0;
          will-change: opacity;
        }

        .frame01-the-wharf-ships {
          clip-path: polygon(45% 8%, 100% 7%, 100% 72%, 72% 72%, 59% 61%, 48% 48%);
        }

        .frame01-the-wharf-lanterns {
          clip-path: polygon(0 8%, 31% 9%, 36% 56%, 20% 68%, 0 62%);
        }

        .frame01-the-wharf-grade,
        .frame01-the-wharf-sun,
        .frame01-the-wharf-ember,
        .frame01-the-wharf-veil {
          position: absolute;
          inset: 0;
          pointer-events: none;
        }

        .frame01-the-wharf-grade {
          background:
            linear-gradient(180deg, rgba(13, 12, 10, 0.08) 0%, rgba(13, 12, 10, 0.02) 52%, rgba(13, 12, 10, 0.46) 100%),
            linear-gradient(90deg, rgba(13, 12, 10, 0.24) 0%, transparent 40%, rgba(13, 12, 10, 0.08) 100%);
        }

        .frame01-the-wharf-sun {
          background: radial-gradient(circle at 82% 35%, rgba(231, 219, 190, 0.14) 0%, rgba(78, 64, 29, 0.12) 22%, rgba(107, 87, 39, 0.06) 39%, transparent 60%);
          mix-blend-mode: screen;
        }

        .frame01-the-wharf-ember {
          background: radial-gradient(circle at 13% 28%, rgba(200, 160, 73, 0.16) 0%, rgba(200, 160, 73, 0.06) 22%, transparent 46%);
          mix-blend-mode: screen;
        }

        .frame01-the-wharf-veil {
          background: #0d0c0a;
          opacity: 0.72;
          will-change: opacity;
        }
      </style>

      <div
        id="root"
        data-composition-id="01-the-wharf"
        data-width="1920"
        data-height="1080"
        data-duration="5.6"
      >
        <div
          id="f01-the-wharf-scene"
          class="clip frame01-the-wharf-scene"
          data-start="0"
          data-duration="5.6"
          data-track-index="0"
        >
          <div id="f01-the-wharf-camera" class="frame01-the-wharf-camera" data-layout-allow-overflow>
            <img
              class="frame01-the-wharf-image frame01-the-wharf-depth"
              src="assets/images/tea-party.png"
              alt=""
              draggable="false"
              data-layout-allow-overflow
            />
            <div class="frame01-the-wharf-focal frame01-the-wharf-ships"></div>
            <div class="frame01-the-wharf-focal frame01-the-wharf-lanterns"></div>
            <div class="frame01-the-wharf-grade"></div>
            <div class="frame01-the-wharf-sun"></div>
            <div class="frame01-the-wharf-ember"></div>
          </div>
          <div class="frame01-the-wharf-veil"></div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};

        const wharfTl = gsap.timeline({ paused: true });
        const camera = document.getElementById("f01-the-wharf-camera");
        const phase = { scale: 1.25, x: 0 };
        const drift = { p: 0 };

        wharfTl.fromTo(
          ".frame01-the-wharf-depth",
          { "--dof": "14px", opacity: 0.12 },
          { "--dof": "1.2px", opacity: 0.82, duration: 1, ease: "power2.inOut" },
          0,
        );

        wharfTl.fromTo(
          ".frame01-the-wharf-focal",
          { opacity: 0.04 },
          { opacity: 0.9, duration: 0.95, ease: "power2.out", stagger: 0.035 },
          0.05,
        );

        wharfTl.fromTo(
          ".frame01-the-wharf-veil",
          { opacity: 0.72 },
          { opacity: 0.24, duration: 1, ease: "power2.inOut" },
          0,
        );

        wharfTl.to(
          phase,
          { scale: 1.29, x: -12, duration: 1.4, ease: "power2.inOut" },
          1,
        );

        wharfTl.to(
          phase,
          { scale: 1.36, x: -54, duration: 1.6, ease: "power3.out" },
          2.4,
        );

        wharfTl.to(
          drift,
          {
            p: Math.PI * 2,
            duration: 4,
            ease: "none",
            onUpdate: () => {
              const dx = Math.sin(drift.p) * 3.5;
              const dy = Math.sin(drift.p * 1.5) * 1.8;
              camera.style.transform = `translate3d(${phase.x + dx}px, ${dy}px, 0) scale(${phase.scale})`;
            },
          },
          0,
        );

        window.__timelines["01-the-wharf"] = wharfTl;
      </script>
    </template>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          container-type: size;
          color: #ffffff;
        }

        .clip {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        #f03-before-the-first-shot-ground {
          z-index: 0;
          background: #0d0c0a;
        }

        #f03-before-the-first-shot-scene {
          z-index: 1;
          background: #0d0c0a;
        }

        #f03-before-the-first-shot-world {
          --dof: 0px;
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          transform-origin: 50% 50%;
          filter: blur(var(--dof));
          will-change: transform, filter, opacity;
        }

        #f03-before-the-first-shot-plate {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
          opacity: 0.72;
          filter: saturate(0.62) sepia(0.16) contrast(1.08);
        }

        #f03-before-the-first-shot-vignette {
          position: absolute;
          inset: 0;
          background:
            linear-gradient(180deg, rgba(13, 12, 10, 0.28) 0%, transparent 25%, transparent 72%, rgba(13, 12, 10, 0.5) 100%),
            linear-gradient(90deg, rgba(13, 12, 10, 0.3) 0%, transparent 23%, transparent 77%, rgba(13, 12, 10, 0.34) 100%);
          pointer-events: none;
        }

        #f03-before-the-first-shot-sun-bloom {
          position: absolute;
          inset: 0;
          background: radial-gradient(
            ellipse 58% 66% at 48% 44%,
            rgba(231, 219, 190, 0.15) 0%,
            rgba(78, 64, 29, 0.11) 38%,
            rgba(107, 87, 39, 0.07) 58%,
            transparent 76%
          );
          mix-blend-mode: screen;
          pointer-events: none;
        }

        #f03-before-the-first-shot-ink-clip {
          z-index: 2;
          background: transparent;
        }

        #f03-before-the-first-shot-ink-wash {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          background:
            radial-gradient(ellipse 44% 58% at 50% 48%, rgba(69, 56, 25, 0.09) 0%, transparent 68%),
            #0d0c0a;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }
      </style>

      <div
        id="root"
        data-composition-id="03-before-the-first-shot"
        data-start="0"
        data-duration="5.4"
        data-width="1920"
        data-height="1080"
      >
        <div
          id="f03-before-the-first-shot-ground"
          class="clip"
          data-start="0"
          data-duration="5.4"
          data-track-index="0"
        ></div>

        <div
          id="f03-before-the-first-shot-scene"
          class="clip"
          data-start="0"
          data-duration="5.4"
          data-track-index="1"
        >
          <div id="f03-before-the-first-shot-world">
            <img
              id="f03-before-the-first-shot-plate"
              src="assets/images/lexington.jpg"
              alt=""
              draggable="false"
            />
            <div id="f03-before-the-first-shot-vignette"></div>
          </div>
          <div id="f03-before-the-first-shot-sun-bloom"></div>
        </div>

        <div
          id="f03-before-the-first-shot-ink-clip"
          class="clip"
          data-start="4.35"
          data-duration="1.05"
          data-track-index="2"
        >
          <div id="f03-before-the-first-shot-ink-wash"></div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};

        const frame03Timeline = gsap.timeline({ paused: true });
        const frame03World = document.getElementById("f03-before-the-first-shot-world");
        const frame03InkWash = document.getElementById("f03-before-the-first-shot-ink-wash");
        const frame03Camera = { scale: 1.36, x: 0, y: 0 };

        function frame03ApplyCamera() {
          frame03World.style.transform = `translate(${frame03Camera.x}px, ${frame03Camera.y}px) scale(${frame03Camera.scale})`;
        }

        frame03ApplyCamera();

        frame03Timeline.fromTo(
          frame03World,
          { "--dof": "14px", opacity: 0.45 },
          {
            "--dof": "0px",
            opacity: 1,
            duration: 0.8,
            ease: "power2.out",
            immediateRender: true,
          },
          0,
        );

        frame03Timeline.to(
          frame03Camera,
          {
            scale: 1.46,
            x: -42,
            y: 10,
            duration: 3.55,
            ease: "power2.inOut",
            onUpdate: frame03ApplyCamera,
          },
          0.8,
        );

        frame03Timeline.fromTo(
          frame03InkWash,
          { scaleX: 0.04, opacity: 0.7 },
          {
            scaleX: 1,
            opacity: 1,
            duration: 0.08,
            ease: "power4.out",
            immediateRender: false,
          },
          4.35,
        );

        window.__timelines["03-before-the-first-shot"] = frame03Timeline;
      </script>
    </template>
  </body>
</html>

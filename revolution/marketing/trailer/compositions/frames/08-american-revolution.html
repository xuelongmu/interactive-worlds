      <script>
        (() => {
          window.__timelines = window.__timelines || {};

          const timeline = gsap.timeline({ paused: true });
          const rulePaths = [
            document.getElementById("f08-american-revolution-rule-top-path"),
            document.getElementById("f08-american-revolution-rule-bottom-path"),
          ];

          rulePaths.forEach((path) => {
            const length = path.getTotalLength();
            path.style.strokeDasharray = String(length);
            path.style.strokeDashoffset = String(length);
            timeline.to(
              path,
              {
                strokeDashoffset: 0,
                duration: 0.82,
                ease: "power2.out",
              },
              0.1,
            );
          });

          timeline.to(
            "#f08-american-revolution-kicker",
            { opacity: 0.62, duration: 0.38, ease: "power1.out" },
            0.48,
          );

          const content = [
            {
              id: "f08-american-revolution-title-line-1",
              text: "AMERICAN",
              baseDuration: 0.3,
              secondsPerCharacter: 0.025,
              lead: 0,
            },
            {
              id: "f08-american-revolution-title-line-2",
              text: "REVOLUTION",
              baseDuration: 0.32,
              secondsPerCharacter: 0.025,
              lead: 0.07,
            },
          ];

          let cursor = 0.82;
          const sequence = content.map((entry) => {
            const start = cursor + entry.lead;
            const duration = entry.baseDuration + entry.text.length * entry.secondsPerCharacter;
            cursor = start + duration;
            return { ...entry, start, duration };
          });

          sequence.forEach((entry) => {
            timeline.fromTo(
              document.getElementById(entry.id),
              { opacity: 0, y: 38, scale: 0.982 },
              {
                opacity: 1,
                y: 0,
                scale: 1,
                duration: entry.duration,
                ease: "power3.out",
              },
              entry.start,
            );
          });

          timeline.fromTo(
            "#f08-american-revolution-meta",
            { opacity: 0, y: 10 },
            { opacity: 0.78, y: 0, duration: 0.34, ease: "power2.out" },
            2.08,
          );

          timeline.to(
            "#f08-american-revolution-headphones",
            { opacity: 0.78, duration: 0.36, ease: "power1.out" },
            2.45,
          );

          timeline.to(
            "#f08-american-revolution-page",
            { opacity: 0.7, duration: 0.28, ease: "power1.out" },
            2.72,
          );

          window.__timelines["08-american-revolution"] = timeline;
        })();
